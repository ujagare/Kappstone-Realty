<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Page Not Found | Kappstone Realty</title>
    <meta
      name="description"
      content="The page you are looking for could not be found. Explore verified Pune properties and connect with Kappstone Realty."
    />
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://kappstonerealty.com/404.html" />
    <link href="assets/img/favicon.png" rel="icon" />
    <link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f8f5ef;
        --surface: #ffffff;
        --text: #163024;
        --muted: #5e6761;
        --brand: #0b5a38;
        --gold: #f0b626;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(240, 182, 38, 0.18), transparent 32%),
          linear-gradient(180deg, #fdfaf3 0%, var(--bg) 100%);
        color: var(--text);
        font-family: "Poppins", sans-serif;
      }

      .error-shell {
        width: min(100%, 760px);
        padding: 40px 28px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(11, 90, 56, 0.08);
        box-shadow: 0 28px 70px rgba(12, 20, 16, 0.08);
        text-align: center;
      }

      .error-shell img {
        width: 140px;
        max-width: 45vw;
        margin-bottom: 22px;
      }

      .error-kicker {
        margin: 0 0 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--brand);
        font-size: 13px;
        font-weight: 700;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(36px, 7vw, 64px);
        line-height: 0.98;
      }

      p {
        margin: 0 auto 26px;
        max-width: 560px;
        color: var(--muted);
        line-height: 1.8;
      }

      .error-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
      }

      .error-actions a {
        min-height: 52px;
        padding: 0 24px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        text-decoration: none;
      }

      .error-primary {
        background: var(--gold);
        color: #1f281e;
      }

      .error-secondary {
        background: var(--brand);
        color: #ffffff;
      }
    </style>
  <!-- Google Search Console Verification -->
  <meta name="google-site-verification" content="-H1_I5L_RvlorG15E-hmq6V15f7Vsem0RXBOgAc2tiY" />

</head>
  <body>
<main class="error-shell">
      <img src="assets/img/Kappstone-logo (1).png" alt="Kappstone Realty" />
      <p class="error-kicker">Page Not Found</p>
      <h1>We couldn't find that page.</h1>
      <p>
        The link may be outdated or the page may have moved. You can return to
        the homepage, browse current listings, or contact us directly.
      </p>
      <div class="error-actions">
        <a href="index.html" class="error-primary">Go to Homepage</a>
        <a href="properties.html" class="error-secondary">Browse Properties</a>
      </div>
    </main>
  </body>
</html>
